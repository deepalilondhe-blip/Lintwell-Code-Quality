<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPhone 17 Pro - Black Titanium Device Frame</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      overflow: hidden;
    }

    /* ============================================
       iPhone 17 Pro - Black Titanium Device Frame
       ============================================ */
    .device-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Outer titanium body */
    .iphone-body {
      position: relative;
      width: 406px;
      height: 880px;
      background: linear-gradient(
        145deg,
        #1a1a1a 0%,
        #2a2a2a 15%,
        #1e1e1e 30%,
        #333333 50%,
        #1a1a1a 70%,
        #2d2d2d 85%,
        #1a1a1a 100%
      );
      border-radius: 58px;
      box-shadow:
        /* Inner highlight - titanium edge reflection */
        inset 0 0 0 1px rgba(255, 255, 255, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        /* Outer shadow - depth */
        0 0 0 1px rgba(0, 0, 0, 0.9),
        0 20px 60px rgba(0, 0, 0, 0.8),
        0 8px 25px rgba(0, 0, 0, 0.6);
      overflow: hidden;
    }

    /* Brushed titanium texture overlay */
    .iphone-body::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 58px;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 1px,
        rgba(255, 255, 255, 0.008) 1px,
        rgba(255, 255, 255, 0.008) 2px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* Titanium frame edge - left and right */
    .titanium-edge-left,
    .titanium-edge-right {
      position: absolute;
      top: 0;
      width: 4px;
      height: 100%;
      z-index: 5;
      pointer-events: none;
    }

    .titanium-edge-left {
      left: 0;
      background: linear-gradient(
        180deg,
        #2a2a2a 0%,
        #3a3a3a 20%,
        #2d2d2d 50%,
        #3a3a3a 80%,
        #2a2a2a 100%
      );
      border-radius: 58px 0 0 58px;
    }

    .titanium-edge-right {
      right: 0;
      background: linear-gradient(
        180deg,
        #2a2a2a 0%,
        #3a3a3a 20%,
        #2d2d2d 50%,
        #3a3a3a 80%,
        #2a2a2a 100%
      );
      border-radius: 0 58px 58px 0;
    }

    /* Top titanium edge */
    .titanium-edge-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(
        90deg,
        #2a2a2a 0%,
        #404040 30%,
        #4a4a4a 50%,
        #404040 70%,
        #2a2a2a 100%
      );
      border-radius: 58px 58px 0 0;
      z-index: 5;
      pointer-events: none;
    }

    /* Bottom titanium edge */
    .titanium-edge-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(
        90deg,
        #2a2a2a 0%,
        #3a3a3a 30%,
        #444444 50%,
        #3a3a3a 70%,
        #2a2a2a 100%
      );
      border-radius: 0 0 58px 58px;
      z-index: 5;
      pointer-events: none;
    }

    /* ---- Side Buttons ---- */

    /* Power / Action button - right side */
    .button-power {
      position: absolute;
      right: -3px;
      top: 220px;
      width: 4px;
      height: 80px;
      background: linear-gradient(
        90deg,
        #3a3a3a 0%,
        #4a4a4a 40%,
        #555555 60%,
        #4a4a4a 100%
      );
      border-radius: 0 3px 3px 0;
      z-index: 10;
      box-shadow:
        1px 0 2px rgba(0,0,0,0.4),
        inset -1px 0 0 rgba(255,255,255,0.05);
    }

    /* Volume Up - left side */
    .button-volume-up {
      position: absolute;
      left: -3px;
      top: 190px;
      width: 4px;
      height: 46px;
      background: linear-gradient(
        90deg,
        #555555 0%,
        #4a4a4a 40%,
        #3a3a3a 100%
      );
      border-radius: 3px 0 0 3px;
      z-index: 10;
      box-shadow:
        -1px 0 2px rgba(0,0,0,0.4),
        inset 1px 0 0 rgba(255,255,255,0.05);
    }

    /* Volume Down - left side */
    .button-volume-down {
      position: absolute;
      left: -3px;
      top: 250px;
      width: 4px;
      height: 46px;
      background: linear-gradient(
        90deg,
        #555555 0%,
        #4a4a4a 40%,
        #3a3a3a 100%
      );
      border-radius: 3px 0 0 3px;
      z-index: 10;
      box-shadow:
        -1px 0 2px rgba(0,0,0,0.4),
        inset 1px 0 0 rgba(255,255,255,0.05);
    }

    /* Action Button - left side (above volume) */
    .button-action {
      position: absolute;
      left: -3px;
      top: 145px;
      width: 4px;
      height: 30px;
      background: linear-gradient(
        90deg,
        #555555 0%,
        #4a4a4a 40%,
        #3a3a3a 100%
      );
      border-radius: 3px 0 0 3px;
      z-index: 10;
      box-shadow:
        -1px 0 2px rgba(0,0,0,0.4),
        inset 1px 0 0 rgba(255,255,255,0.05);
    }

    /* ---- Screen Area ---- */
    .screen {
      position: absolute;
      top: 6px;
      left: 6px;
      right: 6px;
      bottom: 6px;
      background: #000000;
      border-radius: 52px;
      overflow: hidden;
      z-index: 2;
    }

    /* Screen glass reflection */
    .screen::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 52px;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.03) 0%,
        transparent 40%,
        transparent 60%,
        rgba(255, 255, 255, 0.01) 100%
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ---- Status Bar ---- */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      background: transparent;
      z-index: 50;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 17px 28px 0 28px;
      pointer-events: none;
    }

    .status-bar-left {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .status-time {
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
      font-family: -apple-system, 'SF Pro Display', sans-serif;
    }

    .status-bar-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Signal bars */
    .signal-bars {
      display: flex;
      align-items: flex-end;
      gap: 1.5px;
      height: 12px;
    }

    .signal-bar {
      width: 3px;
      background: #ffffff;
      border-radius: 1px;
    }

    .signal-bar:nth-child(1) { height: 4px; }
    .signal-bar:nth-child(2) { height: 6px; }
    .signal-bar:nth-child(3) { height: 8px; }
    .signal-bar:nth-child(4) { height: 11px; }

    /* WiFi icon */
    .wifi-icon {
      width: 16px;
      height: 12px;
      position: relative;
    }

    .wifi-icon::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 3px;
      background: #ffffff;
      border-radius: 50%;
    }

    .wifi-icon::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      clip-path: polygon(50% 100%, 0 30%, 100% 30%);
    }

    /* Battery */
    .battery {
      display: flex;
      align-items: center;
      gap: 1px;
    }

    .battery-body {
      width: 24px;
      height: 12px;
      border: 1.5px solid rgba(255, 255, 255, 0.9);
      border-radius: 3px;
      padding: 1.5px;
      position: relative;
    }

    .battery-body::after {
      content: '';
      position: absolute;
      right: -4px;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 5px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 0 2px 2px 0;
    }

    .battery-level {
      width: 80%;
      height: 100%;
      background: #ffffff;
      border-radius: 1.5px;
    }

    /* ---- Dynamic Island ---- */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 37px;
      background: #000000;
      border-radius: 20px;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 14px;
      box-shadow:
        0 0 0 0.5px rgba(255,255,255,0.04);
    }

    /* Front camera lens inside Dynamic Island */
    .front-camera {
      width: 10px;
      height: 10px;
      background: radial-gradient(
        circle at 40% 40%,
        #1a1a2e 0%,
        #0a0a15 40%,
        #050510 100%
      );
      border-radius: 50%;
      border: 1px solid #1a1a1a;
      box-shadow:
        0 0 2px rgba(0, 0, 0, 0.8),
        inset 0 0 1px rgba(255, 255, 255, 0.05);
    }

    /* ---- Website Content (iframe) ---- */
    .website-content {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border: none;
      border-radius: 52px;
      width: 100%;
      height: 100%;
    }

    /* ---- Home Indicator ---- */
    .home-indicator {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 3px;
      z-index: 55;
    }

    /* ---- Loading placeholder (hidden when iframe loads) ---- */
    .loading-screen {
      position: absolute;
      inset: 0;
      background: #0a0a0a;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 3;
      border-radius: 52px;
      transition: opacity 0.5s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-text {
      color: #555;
      font-size: 13px;
      margin-top: 12px;
      letter-spacing: 0.5px;
    }

    /* Screenshot overlay image (used by Playwright) */
    .screenshot-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 52px;
      z-index: 2;
      display: none;
    }
  </style>
</head>
<body>
  <div class="device-wrapper">
    <div class="iphone-body">
      <!-- Titanium frame edges -->
      <div class="titanium-edge-left"></div>
      <div class="titanium-edge-right"></div>
      <div class="titanium-edge-top"></div>
      <div class="titanium-edge-bottom"></div>

      <!-- Side buttons -->
      <div class="button-power"></div>
      <div class="button-action"></div>
      <div class="button-volume-up"></div>
      <div class="button-volume-down"></div>

      <!-- Screen -->
      <div class="screen">
        <!-- Status Bar -->
        <div class="status-bar">
          <div class="status-bar-left">
            <span class="status-time">9:41</span>
          </div>
          <div class="status-bar-right">
            <div class="signal-bars">
              <div class="signal-bar"></div>
              <div class="signal-bar"></div>
              <div class="signal-bar"></div>
              <div class="signal-bar"></div>
            </div>
            <svg class="wifi-svg" width="16" height="12" viewBox="0 0 16 12" fill="none">
              <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="#fff"/>
              <path d="M4.5 8.5a5 5 0 017 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M2 5.5a8.5 8.5 0 0112 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <div class="battery">
              <div class="battery-body">
                <div class="battery-level"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Dynamic Island -->
        <div class="dynamic-island">
          <div class="front-camera"></div>
        </div>

        <!-- Website iframe -->
        <iframe
          id="site-frame"
          class="website-content"
          src="https://code-quality-tracker.bytestechnolab.net"
          loading="eager"
          allow="fullscreen"
        ></iframe>

        <!-- Screenshot image (used by Playwright instead of iframe) -->
        <img id="screenshot-img" class="screenshot-img" alt="Page screenshot" />

        <!-- Home indicator -->
        <div class="home-indicator"></div>

        <!-- Loading screen -->
        <div id="loading-screen" class="loading-screen">
          <div class="loading-text">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Hide loading screen when iframe loads
    const iframe = document.getElementById('site-frame');
    const loadingScreen = document.getElementById('loading-screen');

    iframe.addEventListener('load', () => {
      setTimeout(() => {
        loadingScreen.classList.add('hidden');
      }, 300);
    });

    // Fallback: hide loading after 5 seconds
    setTimeout(() => {
      loadingScreen.classList.add('hidden');
    }, 5000);

    // Function to load screenshot image instead of iframe
    // Called by Playwright: window.loadScreenshot(dataUrl)
    window.loadScreenshot = function(dataUrl) {
      const img = document.getElementById('screenshot-img');
      img.src = dataUrl;
      img.style.display = 'block';
      iframe.style.display = 'none';
      loadingScreen.classList.add('hidden');
    };
  </script>
</body>
</html>
